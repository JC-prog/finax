site_name: Finax
site_description: Autonomous multi-agent financial intelligence system for real-time market monitoring and sentiment analysis
site_author: JC-Prog
repo_url: https://github.com/JC-Prog/finax
repo_name: JC-Prog/finax

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Architecture:
      - Overview: architecture/overview.md
      - Agents:
          - Scout: architecture/agents/scout.md
          - Analyst: architecture/agents/analyst.md
          - Alert: architecture/agents/alert.md
  - Reference:
      - State & Models: reference/state.md
      - Configuration Reference: reference/config.md
      - Scheduler: reference/scheduler.md
  - Development: development.md
  - Changelog: changelog.md
